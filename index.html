<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSI_thick_of_it</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #bgVideo {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%; 
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1000;
            object-fit: cover; 
        }

        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: rgba(0, 0, 0, 0.3); 
        }

        .login-card {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
        }


        #signInBtn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease; 
        }

        #signInBtn:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,123,255,0.4);
        }

        #errorDisplay {
            color: red;
            font-size: 13px;
            display: none;
            margin-bottom: 15px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <video autoplay muted loop id="bgVideo">
        <source src="TOI.mp4" type="video/mp4">
    </video>

    <audio id="bgMusic" loop>
        <source src="TOISOUND.mp3" type="audio/mpeg">
    </audio>

    <div class="main-container">
        <div class="login-card">
            <form id="loginForm">
                <h2>Form Sign In</h2>
                <hr style="opacity: 0.2; margin-bottom: 20px;">
                
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Masukkan Username">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Masukkan Password">
                </div>

                <p id="errorDisplay">Username atau Password tidak boleh kosong.</p>

                <button type="submit" id="signInBtn">Sign In</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('click', function() {
            const music = document.getElementById('bgMusic');
            music.play().catch(error => console.log("Musik butuh interaksi user"));
        }, { once: true });

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorDisplay');

            if (user === "" || pass === "") {
                errorMsg.style.display = "block";
            } 
            else {
                errorMsg.style.display = "none";
                window.location.href = "https://www.instagram.com/acharius.maxi?igsh=MWQ2eWY0MHdhdGIwdQ=="; 
            }
        });
    </script>

</body>
</html>
